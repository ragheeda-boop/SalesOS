version: '3.8'
services:
  frontend:
    build: .
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build: ../backend
    ports:
      - "3001:3001"
    environment:
      - PG_HOST=postgres
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-salesos-prod-secret}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=salesos
      - POSTGRES_USER=salesos
      - POSTGRES_PASSWORD=${PG_PASSWORD:-salesos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesos"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=none
    volumes:
      - neo4j_data:/data
    ports:
      - "7687:7687"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
