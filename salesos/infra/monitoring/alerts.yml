groups:
  - name: salesos
    interval: 30s
    rules:
      # ── Error Rate ──
      - alert: HighErrorRate
        expr: rate(salesos_http_requests_total{status=~"5.."}[5m]) / rate(salesos_http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx error rate ({{ $value | humanizePercentage }})"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      # ── High Latency ──
      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(salesos_http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "P99 latency is {{ $value }}s"
          description: "P99 request latency is {{ $value }}s, above 1s threshold"

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, rate(salesos_http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency is {{ $value }}s"
          description: "P95 request latency is {{ $value }}s, above 500ms threshold"

      # ── Service Health ──
      - alert: BackendServiceDown
        expr: up{job="salesos-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "Healthcheck has failed for over 1 minute"

      - alert: BackendUnhealthy
        expr: up{job="salesos-backend"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Backend service unhealthy for 5m"
          description: "Healthcheck failing for 5 consecutive minutes — investigate immediately"

      - alert: BackendDegraded
        expr: rate(salesos_http_requests_total{status=~"5.."}[5m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Backend returning 5xx errors"
          description: "Server errors detected over the last 10 minutes"

      # ── Database ──
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is unreachable"

      - alert: PostgresHighConnections
        expr: pg_stat_database_numbackends > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL has {{ $value }} active connections"

      # ── DB Pool Saturation ──
      - alert: DBPoolSaturated
        expr: salesos_db_pool_checkedout / (salesos_db_pool_checkedout + salesos_db_pool_checkedin + 0.001) > 0.9
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "DB connection pool > 90% utilized"
          description: "Database connection pool is near saturation — risk of request timeouts"

      # ── Redis ──
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is unreachable"

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage > 90%"
          description: "Redis approaching maxmemory — eviction may be active"

      # ── Neo4j ──
      - alert: Neo4jDown
        expr: neo4j_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Neo4j is unreachable"

      # ── DB Query Performance ──
      - alert: SlowDatabaseQueries
        expr: histogram_quantile(0.95, rate(salesos_db_query_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 DB query duration is {{ $value }}s"
          description: "Database queries are slower than 1s P95"

      # ── AI Inference Performance ──
      - alert: SlowAIInference
        expr: histogram_quantile(0.95, rate(salesos_ai_inference_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 AI inference time is {{ $value }}s"
          description: "AI model inference exceeding 10s P95"

      # ── WebSocket ──
      - alert: WebSocketConnectionsHigh
        expr: salesos_websocket_active > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket connections: {{ $value }}"
          description: "Approaching per-tenant WebSocket connection limit (100)"

      # ── Zero Requests (possible routing issue) ──
      - alert: NoTraffic
        expr: rate(salesos_http_requests_total[5m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No HTTP traffic detected"
          description: "Zero requests in the last 10 minutes — possible routing issue"

      # ── Existing infra alerts ──
      - alert: QueueDepthHigh
        expr: kafka_consumer_lag > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is {{ $value }}"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Disk space below 10% on {{ $labels.mountpoint }}"

      - alert: MemoryUsageHigh
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage above 90%"

      # ── SLA Violation ──
      - alert: SLACriticalPathBreach
        expr: histogram_quantile(0.99, rate(salesos_http_request_duration_seconds_bucket{path=~"/api/v1/companies.*|/api/v1/search.*|/api/v1/dashboard.*"}[5m])) > 0.7
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical path SLA breached: P99 > 700ms"
          description: "P99 latency for critical endpoints exceeds 700ms SLA threshold"

      - alert: SLAAuthBreach
        expr: histogram_quantile(0.99, rate(salesos_http_request_duration_seconds_bucket{path=~"/api/v1/identity.*|/api/v1/sso.*"}[5m])) > 0.8
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Auth SLA breached: P99 > 800ms"
          description: "P99 latency for auth endpoints exceeds 800ms SLA threshold"
