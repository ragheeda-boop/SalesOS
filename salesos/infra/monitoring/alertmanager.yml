route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h

receivers:
  - name: "default"
    slack_configs:
      - send_resolved: true
        title: "{{ .GroupLabels.alertname }}"
        text: "{{ .CommonAnnotations.summary }}"

  - name: "critical"
    slack_configs:
      - send_resolved: true
        title: "[CRITICAL] {{ .GroupLabels.alertname }}"
        text: "{{ .CommonAnnotations.summary }}"
