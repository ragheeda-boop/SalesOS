apiVersion: apps/v1
kind: Deployment
metadata:
  name: salesos-backend
  labels:
    app: salesos-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: salesos-backend
  template:
    metadata:
      labels:
        app: salesos-backend
    spec:
      containers:
        - name: backend
          image: salesos/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: salesos-secrets
                  key: database_url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: salesos-secrets
                  key: jwt_secret_key
            - name: ENV
              value: "production"
            - name: DEBUG
              value: "false"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: salesos-backend
spec:
  selector:
    app: salesos-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
