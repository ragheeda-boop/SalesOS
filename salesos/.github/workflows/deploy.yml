name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to deploy (e.g. abc1234). Leave empty for latest main."
        required: false
        type: string
      skip_tests:
        description: "Skip pre-deploy tests (emergency only)"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ragheeda-boop/salesos
  DEPLOY_HOST: /opt/salesos
  HEALTH_ENDPOINT: "http://localhost:8000/health"
  HEALTH_WAIT: 30
  HEALTH_RETRIES: 6

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  # ──────────────────────────────────────────────
  # Pre-deploy validation
  # ──────────────────────────────────────────────
  pre-deploy-check:
    name: Pre-deploy Validation
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify CI passed on this commit
        run: |
          echo "Checking CI status for commit ${{ github.sha }}..."
          # Verify the commit is on main branch
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "::error::Deploy only allowed from main branch"
            exit 1
          fi
          echo "Branch check passed."
      - name: Resolve deploy version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "image_tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi
          echo "Deploying tag: ${{ steps.version.outputs.image_tag }}"

  # ──────────────────────────────────────────────
  # Stage 1: Deploy to BLUE (idle slot)
  # ──────────────────────────────────────────────
  deploy-blue:
    name: Deploy Blue Slot
    needs: pre-deploy-check
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ needs.pre-deploy-check.outputs.image_tag || github.sha }}
      deploy_status: ${{ steps.deploy.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to blue slot
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/salesos
            IMAGE_TAG="${{ needs.pre-deploy-check.outputs.image_tag || github.sha }}"
            SHORT_TAG=$(echo "$IMAGE_TAG" | cut -c1-7)
            export IMAGE_TAG

            echo "=== Blue-Green Deploy ==="
            echo "Image tag: $SHORT_TAG"

            # Determine which slot is currently live
            CURRENT_SLOT=$(docker compose -f docker-compose.prod.yml ps --format json | \
              grep '"backend"' | grep -o '"Slot":"[^"]*"' | cut -d'"' -f4 || echo "none")
            echo "Current live slot: $CURRENT_SLOT"

            if [ "$CURRENT_SLOT" = "blue" ]; then
              DEPLOY_SLOT="green"
            else
              DEPLOY_SLOT="blue"
            fi
            echo "Deploying to: $DEPLOY_SLOT"
            echo "slot=$DEPLOY_SLOT" >> $GITHUB_OUTPUT

            # Pull new images
            docker compose -f docker-compose.prod.yml pull

            # Run migrations on new slot
            SLOT_ENV="DEPLOY_SLOT=$DEPLOY_SLOT"
            docker compose -f docker-compose.prod.yml run --rm $SLOT_ENV migrations

            # Deploy new slot
            docker compose -f docker-compose.prod.yml up -d --no-deps \
              --scale backend-${DEPLOY_SLOT}=1 \
              backend-${DEPLOY_SLOT}

            echo "Blue slot deployed successfully"
            echo "status=deployed" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────
  # Stage 2: Health Check Gate (30s wait)
  # ──────────────────────────────────────────────
  health-check:
    name: Health Check Gate
    needs: deploy-blue
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment stabilization
        run: |
          echo "Waiting ${{ env.HEALTH_WAIT }}s for deployment to stabilize..."
          sleep ${{ env.HEALTH_WAIT }}

      - name: Verify blue slot health
        id: health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/salesos
            SLOT="${{ needs.deploy-blue.outputs.slot }}"
            HEALTH_URL="${{ secrets.VPS_HEALTH_ENDPOINT || 'http://localhost:8000/health' }}"

            echo "Health checking slot: $SLOT"
            echo "Endpoint: $HEALTH_URL"

            for i in $(seq 1 ${{ env.HEALTH_RETRIES }}); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")
              echo "Attempt $i: HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "Health check PASSED"
                echo "health_ok=true" >> $GITHUB_OUTPUT
                exit 0
              fi
              sleep 10
            done
            echo "::error::Health check failed after ${{ env.HEALTH_RETRIES }} attempts"
            echo "health_ok=false" >> $GITHUB_OUTPUT
            exit 1

  # ──────────────────────────────────────────────
  # Stage 3: Smoke Tests
  # ──────────────────────────────────────────────
  smoke-tests:
    name: Post-deploy Smoke Tests
    needs: [deploy-blue, health-check]
    runs-on: ubuntu-latest
    steps:
      - name: Run smoke tests
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            BASE="${{ secrets.VPS_HEALTH_ENDPOINT || 'http://localhost:8000' }}"
            ENDPOINTS="/health /health/ready /ping"
            FAILURES=0

            for EP in $ENDPOINTS; do
              URL="${BASE}${EP}"
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "PASS: $URL -> $STATUS"
              else
                echo "FAIL: $URL -> $STATUS"
                FAILURES=$((FAILURES + 1))
              fi
            done

            if [ "$FAILURES" -gt 0 ]; then
              echo "::error::$FAILURES smoke test(s) failed"
              exit 1
            fi
            echo "All smoke tests passed"

  # ──────────────────────────────────────────────
  # Stage 4: Switch traffic (blue-green cutover)
  # ──────────────────────────────────────────────
  cutover:
    name: Blue-Green Cutover
    needs: [deploy-blue, health-check, smoke-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Switch traffic to new slot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/salesos
            NEW_SLOT="${{ needs.deploy-blue.outputs.slot }}"
            echo "Switching traffic to: $NEW_SLOT"

            # Update Caddy config to point to new backend
            # Scale down old slot, scale up new slot
            if [ "$NEW_SLOT" = "blue" ]; then
              docker compose -f docker-compose.prod.yml up -d --no-deps \
                --scale backend-green=0 \
                --scale backend-blue=1 \
                backend-blue caddy
            else
              docker compose -f docker-compose.prod.yml up -d --no-deps \
                --scale backend-blue=0 \
                --scale backend-green=1 \
                backend-green caddy
            fi

            echo "Cutover complete — traffic now on $NEW_SLOT"

  # ──────────────────────────────────────────────
  # Rollback on failure
  # ──────────────────────────────────────────────
  rollback:
    name: Automatic Rollback
    if: failure()
    needs: [deploy-blue, health-check, smoke-tests, cutover]
    runs-on: ubuntu-latest
    steps:
      - name: Rollback to previous slot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/salesos
            FAILED_SLOT="${{ needs.deploy-blue.outputs.slot }}"

            if [ "$FAILED_SLOT" = "blue" ]; then
              PREV_SLOT="green"
            else
              PREV_SLOT="blue"
            fi

            echo "ROLLING BACK: $FAILED_SLOT -> $PREV_SLOT"
            docker compose -f docker-compose.prod.yml up -d --no-deps \
              --scale "backend-${FAILED_SLOT}=0" \
              --scale "backend-${PREV_SLOT}=1" \
              "backend-${PREV_SLOT}" caddy

            echo "Rollback complete — traffic restored to $PREV_SLOT"

      - name: Log rollback
        run: |
          echo "::error::Automatic rollback triggered"
          echo "REF: ${{ github.ref_name }}"
          echo "COMMIT: ${{ github.sha }}"
          echo "FAILED_SLOT: ${{ needs.deploy-blue.outputs.slot }}"
          echo "WORKFLOW: ${{ github.workflow }}"
          echo "RUN: ${{ github.run_id }}"

  # ──────────────────────────────────────────────
  # Notifications
  # ──────────────────────────────────────────────
  notify:
    name: Deploy Notification
    if: always()
    needs: [deploy-blue, health-check, smoke-tests, cutover]
    runs-on: ubuntu-latest
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.smoke-tests.result }}" = "success" ] && [ "${{ needs.cutover.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=:white_check_mark:" >> $GITHUB_OUTPUT
            echo "color=#36a64f" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=:x:" >> $GITHUB_OUTPUT
            echo "color=#ff0000" >> $GITHUB_OUTPUT
          fi

      - name: Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "attachments": [{
                "color": "${{ steps.status.outputs.color }}",
                "blocks": [{
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.status.outputs.emoji }} *SalesOS Production Deploy* — `${{ needs.deploy-blue.outputs.image_tag }}`\nStatus: *${{ steps.status.outputs.status }}*\nRef: `${{ github.ref_name }}`\nRun: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View>"
                  }
                }]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Teams notification
        if: env.TEAMS_WEBHOOK_URL != ''
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.status.outputs.status }}';
            const tag = '${{ needs.deploy-blue.outputs.image_tag }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const color = status === 'success' ? 'Good' : 'Error';
            const payload = {
              '@type': 'MessageCard',
              '@context': 'http://schema.org/extensions',
              themeColor: status === 'success' ? '36a64f' : 'ff0000',
              summary: `Deploy ${status}: ${tag}`,
              sections: [{
                activityTitle: `${emoji} SalesOS Production Deploy — ${tag}`,
                text: `Status: **${status}**\nRef: \`${{ github.ref_name }}\`\nRun: [View](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
                markdown: true
              }]
            };
            const http = require('https');
            const url = new URL(process.env.TEAMS_WEBHOOK_URL);
            const options = { hostname: url.hostname, path: url.pathname, method: 'POST', headers: { 'Content-Type': 'application/json' } };
            const req = http.request(options, (res) => { console.log(`Teams response: ${res.statusCode}`); });
            req.write(JSON.stringify(payload));
            req.end();
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}

      - name: GitHub commit comment
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.status.outputs.status }}';
            const tag = '${{ needs.deploy-blue.outputs.image_tag }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const message = `${emoji} Production deploy **${status}** — \`${tag}\`\nRun: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: message
            });
