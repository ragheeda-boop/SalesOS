name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ragheeda-boop/salesos

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: |
          cd backend
          poetry install
      - name: Ruff lint
        run: cd backend && poetry run ruff check app/ tests/ sdk/ modules/ cli/
      - name: MyPy type check
        run: cd backend && poetry run mypy app/ sdk/ modules/ cli/

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: ESLint
        run: cd frontend && npm run lint
      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: salesos
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'salesos_test' }}
          POSTGRES_DB: salesos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: |
          cd backend
          poetry install
      - name: Run migrations
        run: |
          cd backend
          DATABASE_URL=postgresql+asyncpg://salesos:${{ secrets.POSTGRES_PASSWORD || 'salesos_test' }}@localhost:5432/salesos_test poetry run alembic upgrade head
      - name: Run tests
        run: |
          cd backend
          TEST_DATABASE_URL=postgresql+asyncpg://salesos:${{ secrets.POSTGRES_PASSWORD || 'salesos_test' }}@localhost:5432/salesos_test poetry run pytest -v --cov=app --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v3

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Run tests
        run: cd frontend && npm run test

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check for forbidden files
        run: |
          forbidden=0
          for pattern in '*.env' '*.key' '*.pem' 'secrets.*' 'credentials*' '*.p12'; do
            files=$(git ls-files -- "$pattern" 2>/dev/null || true)
            if [ -n "$files" ]; then
              echo "::error::Forbidden pattern '$pattern' found: $files"
              forbidden=1
            fi
          done
          if [ "$forbidden" = "1" ]; then
            echo "Forbidden files detected — these must not be committed."
            exit 1
          fi
          echo "No forbidden files detected."
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
      - name: npm audit
        run: |
          cd frontend
          npm audit --audit-level=moderate || true
      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/npm-audit-report.txt

  arch-compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run architecture compliance check
        shell: pwsh
        run: |
          $result = & "${{ github.workspace }}/scripts/arch-compliance.ps1" -JsonOnly
          $report = $result | ConvertFrom-Json
          Write-Host "Overall Compliance: $($report.overall_compliance)%"
          Write-Host "Target: $($report.summary.target_compliance)%"
          if ($report.overall_compliance -lt $report.summary.target_compliance) {
            Write-Host "::error::Architecture compliance $($report.overall_compliance)% is below target $($report.summary.target_compliance)%"
            exit 1
          }
          Write-Host "::notice::Architecture compliance $($report.overall_compliance)% meets target"
      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch-compliance-report
          path: reports/arch-compliance-report.json

  build-and-push:
    if: github.ref == 'refs/heads/main'
    needs: [lint-backend, lint-frontend, test-backend, test-frontend, security-scan, arch-compliance]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image tag
        id: meta
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:${{ steps.meta.outputs.tag }}
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ steps.meta.outputs.tag }}
