version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      radix:
        patterns:
          - "@radix-ui/*"
      testing:
        patterns:
          - "@testing-library/*"
          - "jest*"
          - "ts-jest"

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
    groups:
      fastapi:
        patterns:
          - "fastapi*"
          - "uvicorn*"
          - "pydantic*"
      testing:
        patterns:
          - "pytest*"
          - "coverage*"

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    labels:
      - docker
      - backend

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    labels:
      - docker
      - frontend

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
      - github-actions
