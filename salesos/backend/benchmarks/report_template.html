<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 2rem; }
        h1 { color: #f8fafc; font-size: 1.75rem; margin-bottom: 0.5rem; }
        h2 { color: #94a3b8; font-size: 1.25rem; margin: 1.5rem 0 0.75rem; padding-bottom: 0.25rem; border-bottom: 1px solid #1e293b; text-transform: uppercase; letter-spacing: 0.05em; }
        .meta { color: #64748b; font-size: 0.875rem; margin-bottom: 1.5rem; }
        .summary { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .card { background: #1e293b; border-radius: 0.5rem; padding: 1rem 1.5rem; flex: 1; }
        .card .value { font-size: 2rem; font-weight: 700; color: #f8fafc; }
        .card .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .card.violations .value { color: #ef4444; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-size: 0.875rem; }
        th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid #1e293b; }
        th { color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
        td { font-family: 'SF Mono', 'Fira Code', monospace; }
        tr:hover td { background: #1e293b; }
        .violation td { background: rgba(239, 68, 68, 0.1); }
        .violation td:nth-child(3) { color: #ef4444; font-weight: 700; }
        .footer { color: #475569; font-size: 0.75rem; margin-top: 2rem; text-align: center; }
    </style>
</head>
<body>
    <h1>SalesOS Benchmark Report</h1>
    <div class="meta">
        Run: {{RUN_ID}} &middot; Version: {{VERSION}} &middot; {{TIMESTAMP}}
    </div>
    <div class="summary">
        <div class="card">
            <div class="value">{{TOTAL}}</div>
            <div class="label">Benchmarks</div>
        </div>
        <div class="card violations">
            <div class="value">{{VIOLATIONS}}</div>
            <div class="label">Budget Violations</div>
        </div>
    </div>
    {{SECTIONS}}
    <div class="footer">Generated by SalesOS Benchmark Suite</div>
</body>
</html>
