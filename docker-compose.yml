services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: salesos
      POSTGRES_PASSWORD: salesos_dev_password
      POSTGRES_DB: salesos
    ports:
      - "6432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesos"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/salesos_neo4j_dev
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4jdata:/data

  api:
    build:
      context: ./salesos/backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENV: development
      DEBUG: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: salesos
      POSTGRES_PASSWORD: salesos_dev_password
      POSTGRES_DB: salesos
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: salesos_neo4j_dev
      SECRET_KEY: salesos-jwt-dev-key-change-in-production
      JWT_SECRET_KEY: salesos-jwt-dev-key-change-in-production
      SALESOS_TESTING: "false"
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
  neo4jdata:
